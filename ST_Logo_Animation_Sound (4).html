<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }

  @keyframes drawCyan {
    from { stroke-dashoffset: 629; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes drawWhite {
    from { stroke-dashoffset: 519; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes scaleIn {
    0%   { transform: scale(0); }
    65%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes textPop {
    0%   { opacity: 0; transform: scale(0.55); }
    70%  { opacity: 1; transform: scale(1.07); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes subtlePulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.75; }
  }

  /* Alle Elemente starten still — JS triggert alles synchron */
  #cyan-ring {
    stroke-dasharray: 629;
    stroke-dashoffset: 629;
    transform: rotate(-90deg);
    transform-origin: 130px 130px;
  }
  #cyan-ring.anim  { animation: drawCyan 0.95s ease-in-out forwards; }
  #cyan-ring.pulse { animation: subtlePulse 2.8s ease-in-out infinite; }

  #black-outer {
    transform-origin: 130px 130px;
    transform: scale(0);
  }
  #black-outer.anim { animation: scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  #white-ring {
    stroke-dasharray: 519;
    stroke-dashoffset: 519;
    transform: rotate(90deg) scaleX(-1);
    transform-origin: 130px 130px;
  }
  #white-ring.anim { animation: drawWhite 0.6s ease-in-out forwards; }

  #black-inner {
    transform-origin: 130px 130px;
    transform: scale(0);
  }
  #black-inner.anim { animation: scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  #st-text {
    opacity: 0;
    transform-origin: 130px 130px;
  }
  #st-text.anim { animation: textPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  button {
    margin-top: 28px;
    padding: 8px 22px;
    background: transparent;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  button:hover { color: #fff; border-color: #888; }
</style>
</head>
<body>

<svg width="260" height="260" viewBox="0 0 260 260">
  <circle id="cyan-ring"   cx="130" cy="130" r="96.25" fill="none" stroke="#22D3EE" stroke-width="7.5"/>
  <circle id="black-outer" cx="130" cy="130" r="92.5"  fill="#000"/>
  <circle id="white-ring"  cx="130" cy="130" r="82.5"  fill="none" stroke="#fff" stroke-width="2"/>
  <circle id="black-inner" cx="130" cy="130" r="80"    fill="#000"/>
  <text id="st-text"
    x="130" y="130"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Canva Sans'"
    font-weight="bold"
    font-style="italic"
    font-size="74"
    fill="#fff">ST</text>
</svg>

<button onclick="replayAnim()">&#8635; Replay</button>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ── Audi-Style Sound Design ─────────────────────────────
// Eleganter Premium-Sweep: harmonisch, tief, cinematic

// Sinus-Sweep Schicht — reiner Ton der aufsteigt
function sineSweep(when, fromHz, toHz, dur, vol) {
  var osc  = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(fromHz, when);
  osc.frequency.exponentialRampToValueAtTime(toHz, when + dur);
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(vol, when + dur * 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, when + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(when); osc.stop(when + dur + 0.05);
}

// Noise-Swoosh — seidiger Wind darunter
function noiseSwoosh(when, dur, freqFrom, freqTo, vol) {
  var len  = Math.ceil(audioCtx.sampleRate * dur);
  var buf  = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  var d    = buf.getChannelData(0);
  for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  var src  = audioCtx.createBufferSource();
  src.buffer = buf;

  var bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(freqFrom, when);
  bp.frequency.linearRampToValueAtTime(freqTo, when + dur * 0.5);
  bp.frequency.linearRampToValueAtTime(freqFrom * 0.6, when + dur);
  bp.Q.value = 0.6;

  var lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = freqTo * 1.4;

  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(vol, when + dur * 0.12);
  gain.gain.exponentialRampToValueAtTime(0.001, when + dur);

  src.connect(bp); bp.connect(lp); lp.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(when); src.stop(when + dur + 0.05);
}

// Audi-artiger Whoosh beim Ring-Aufziehen:
// Seidiger Sweep + harmonischer Ton
function playWhoosh(when, duration, vol) {
  vol = vol || 1;
  // Grundton-Sweep (tief → mittel → löst auf)
  sineSweep(when, 55,  220, duration * 0.6,  0.28 * vol);
  sineSweep(when + duration * 0.25, 110, 330, duration * 0.55, 0.18 * vol);
  // Seidiger Noise-Teppich
  noiseSwoosh(when, duration, 80, 400, 0.22 * vol);
}

// Audi-artiger Pop — tiefer weicher Ton, kein harter Schlag
function playPop(when, vol) {
  vol = vol || 1;
  // Weicher Sub-Ton
  sineSweep(when, 90, 45, 0.4, 0.55 * vol);
  // Harmonischer Oberton
  sineSweep(when, 180, 90, 0.25, 0.2 * vol);
  // Kurzer Noise-Body
  noiseSwoosh(when, 0.18, 60, 180, 0.15 * vol);
}

// Audi-artiger finaler Chord — eleganter Auflöse-Akkord
// 3 Töne die zusammen landen, dann ein tiefes Sustain
function playImpact(when) {
  // Akkord: Terz-Schichtung wie beim Audi-Logo-Sound
  // Grundton
  sineSweep(when, 65,  55,  0.9, 0.55);
  // Quinte
  sineSweep(when, 98,  82,  0.8, 0.35);
  // Oktave
  sineSweep(when, 130, 110, 0.7, 0.25);
  // Seidiger Swoosh zum Abschluss
  noiseSwoosh(when, 0.5, 100, 600, 0.2);
  noiseSwoosh(when + 0.05, 0.7, 60, 200, 0.3);

  // Sustain Sub-Bass der ausschwingt
  var osc  = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(55, when + 0.1);
  osc.frequency.exponentialRampToValueAtTime(40, when + 1.2);
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(0.45, when + 0.2);
  gain.gain.exponentialRampToValueAtTime(0.001, when + 1.3);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(when); osc.stop(when + 1.4);
}

// Animation-Element triggern (class hinzufügen = Animation startet)
function trigger(id, delayMs) {
  setTimeout(function() {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('anim', 'pulse');
    void el.offsetWidth;
    el.classList.add('anim');
  }, delayMs);
}

// Alles starten — Sound und Animation exakt synchron
// Timings:
//  100ms / 0.10s → Cyan-Ring  (Whoosh 0.95s)
// 1100ms / 1.10s → Black-Outer (Pop)
// 1550ms / 1.55s → White-Ring (Whoosh 0.6s)
// 2200ms / 2.20s → Black-Inner (Pop leiser)
// 2620ms / 2.62s → ST-Text    (Impact)
// 3300ms         → Pulse

function startAll() {
  var now = audioCtx.currentTime;

  playWhoosh(now + 0.10,  0.95, 1.0);
  playPop   (now + 1.10,        0.8);
  playWhoosh(now + 1.55,  0.60, 0.65);
  playPop   (now + 2.20,        0.5);
  playImpact(now + 2.62);

  trigger('cyan-ring',    100);
  trigger('black-outer', 1100);
  trigger('white-ring',  1550);
  trigger('black-inner', 2200);
  trigger('st-text',     2620);

  setTimeout(function() {
    var el = document.getElementById('cyan-ring');
    if (!el) return;
    el.classList.remove('anim');
    el.style.strokeDashoffset = '0';  // Ring bleibt sichtbar
    el.style.transform = 'rotate(-90deg)';
    void el.offsetWidth;
    el.classList.add('pulse');
  }, 3300);
}

window.addEventListener('load', function() {
  audioCtx.resume().then(function() { startAll(); });
});

function replayAnim() {
  ['cyan-ring','black-outer','white-ring','black-inner','st-text'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('anim', 'pulse');
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });
  audioCtx.resume().then(function() { startAll(); });
}
</script>
</body>
</html>
