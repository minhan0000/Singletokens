<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }

  @keyframes drawCyan {
    from { stroke-dashoffset: 629; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes drawWhite {
    from { stroke-dashoffset: 519; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes scaleIn {
    0%   { transform: scale(0); }
    65%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes textPop {
    0%   { opacity: 0; transform: scale(0.55); }
    70%  { opacity: 1; transform: scale(1.07); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes subtlePulse {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.75; }
  }

  #cyan-ring {
    stroke-dasharray: 629;
    stroke-dashoffset: 629;
    transform: rotate(-90deg);
    transform-origin: 130px 130px;
    animation: drawCyan 0.95s ease-in-out 0.1s forwards;
  }
  #black-outer {
    transform-origin: 130px 130px;
    transform: scale(0);
    animation: scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) 1.1s forwards;
  }
  #white-ring {
    stroke-dasharray: 519;
    stroke-dashoffset: 519;
    transform: rotate(-90deg);
    transform-origin: 130px 130px;
    animation: drawWhite 0.6s ease-in-out 1.55s forwards;
  }
  #black-inner {
    transform-origin: 130px 130px;
    transform: scale(0);
    animation: scaleIn 0.38s cubic-bezier(0.34,1.56,0.64,1) 2.2s forwards;
  }
  #st-text {
    opacity: 0;
    transform-origin: 130px 130px;
    animation: textPop 0.5s cubic-bezier(0.34,1.56,0.64,1) 2.62s forwards;
  }
  #cyan-ring.pulse {
    animation: drawCyan 0.95s ease-in-out 0.1s forwards,
               subtlePulse 2.8s ease-in-out 3.3s infinite;
  }

  button {
    margin-top: 28px;
    padding: 8px 22px;
    background: transparent;
    color: #aaa;
    border: 1px solid #444;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  button:hover { color: #fff; border-color: #888; }
</style>
</head>
<body>

<svg width="260" height="260" viewBox="0 0 260 260">
  <!-- Cyan ring: outer ⌀200mm / inner ⌀185mm → r=96.25, stroke=7.5 -->
  <circle id="cyan-ring" cx="130" cy="130" r="96.25"
    fill="none" stroke="#22D3EE" stroke-width="7.5"/>

  <!-- Black fill to ⌀185mm (r=92.5) -->
  <circle id="black-outer" cx="130" cy="130" r="92.5" fill="#000"/>

  <!-- White ring at ⌀165mm (r=82.5), stroke=2 -->
  <circle id="white-ring" cx="130" cy="130" r="82.5"
    fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Black inner circle ⌀160mm (r=80) -->
  <circle id="black-inner" cx="130" cy="130" r="80" fill="#000"/>

  <!-- ST – Canva Sans Bold Italic 74px, zentriert -->
  <text id="st-text"
    x="130" y="130"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Canva Sans'"
    font-weight="bold"
    font-style="italic"
    font-size="74"
    fill="#fff">ST</text>
</svg>

<button onclick="replayAnim()">↺ Replay</button>

<script>
setTimeout(() => {
  const el = document.getElementById('cyan-ring');
  if (el) el.classList.add('pulse');
}, 3400);

function replayAnim() {
  const ids = ['cyan-ring','black-outer','white-ring','black-inner','st-text'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('pulse');
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });
  setTimeout(() => {
    const el = document.getElementById('cyan-ring');
    if (el) el.classList.add('pulse');
  }, 3400);
}
</script>
</body>
</html>
