<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--black:#111111;--white:#FFFFFF;--bg:#F4F1E8;--cyan:#00CFFF;--yellow:#FFD93D;--green:#3FE07C;--red:#FF3B30}
html,body{height:100%;background:var(--bg);font-family:'Archivo',Helvetica,Arial,sans-serif;color:var(--black)}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background:radial-gradient(rgba(17,17,17,.18) 1.2px,transparent 1.2px);
  background-size:24px 24px;background-color:var(--bg);
}

/* LOGO ROW */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;text-align:center;justify-content:center}
.logo-mark{width:38px;height:38px;background:var(--cyan);border:3px solid var(--black);box-shadow:4px 4px 0 var(--black);display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',sans-serif;font-size:13px;transform:rotate(-2deg)}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:20px}
.logo-text span{background:var(--cyan);padding:0 4px;display:inline-block;transform:rotate(-1deg)}

/* CARD */
.card{width:100%;max-width:420px;background:var(--white);border:3px solid var(--black);box-shadow:10px 10px 0 var(--black);padding:36px 32px 28px}

/* TABS */
.tabs{display:flex;gap:0;border:3px solid var(--black);margin-bottom:26px}
.tab{flex:1;padding:10px;border:none;background:transparent;color:#888;font-family:'Archivo Black',sans-serif;font-size:14px;text-transform:uppercase;cursor:pointer;transition:all .12s}
.tab.active{background:var(--black);color:var(--white)}
.tab:first-child{border-right:3px solid var(--black)}

/* FORM */
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#555;margin-bottom:7px}
input{width:100%;padding:12px 14px;background:var(--white);border:2px solid var(--black);color:var(--black);font-size:15px;font-family:'Archivo',sans-serif;font-weight:600;outline:none;transition:box-shadow .12s}
input:focus{box-shadow:4px 4px 0 var(--cyan)}
input::placeholder{color:#AAAAAA;font-weight:400}

/* SUBMIT */
.btn-submit{width:100%;padding:15px;background:var(--yellow);border:3px solid var(--black);box-shadow:5px 5px 0 var(--black);color:var(--black);font-family:'Archivo Black',sans-serif;font-size:15px;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:transform .1s,box-shadow .1s}
.btn-submit:hover:not(:disabled){transform:translate(2px,2px);box-shadow:3px 3px 0 var(--black)}
.btn-submit:active:not(:disabled){transform:translate(5px,5px);box-shadow:0 0 0 var(--black)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}

/* ERROR / SUCCESS */
.error-box{background:rgba(255,59,48,.08);border:2px solid var(--red);padding:10px 14px;font-size:13px;font-weight:600;color:var(--red);margin-bottom:14px;display:none}
.error-box.show{display:block}
.success-box{background:rgba(63,224,124,.08);border:2px solid var(--green);padding:10px 14px;font-size:13px;font-weight:600;color:#0B7A3B;margin-bottom:14px;display:none}
.success-box.show{display:block}

/* BONUS BADGE */
.bonus-badge{display:flex;align-items:flex-start;gap:10px;background:rgba(0,207,255,.08);border:2px solid var(--cyan);padding:12px 14px;margin-bottom:20px}
.bonus-icon{font-size:20px;flex-shrink:0}
.bonus-badge span{font-size:13px;font-weight:600;line-height:1.5}
.bonus-badge strong{color:#0A73A8}

/* FOOTER */
.card-footer{text-align:center;margin-top:18px;font-size:13px;font-weight:600;color:#777}
.card-footer a{color:var(--black);font-weight:800;text-decoration:none;border-bottom:2px solid var(--black)}
.card-footer a:hover{background:var(--yellow)}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:var(--black);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}

.fade-in{animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="logo-row">
  <div class="logo-mark">ST</div>
  <div class="logo-text">Single<span>Tokens</span></div>
</div>

<div class="card fade-in">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Anmelden</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Registrieren</button>
  </div>

  <div id="error-box" class="error-box"></div>
  <div id="success-box" class="success-box"></div>

  <!-- LOGIN FORM -->
  <div id="form-login">
    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="login-email" placeholder="deine@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">Anmelden →</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none">
    <div class="bonus-badge">
      <span class="bonus-icon">🎁</span>
      <span>Du bekommst <strong>500K Tokens gratis</strong> beim Registrieren – kein Abo, kein Risiko.</span>
    </div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="reg-name" placeholder="Dein Name" autocomplete="name">
    </div>
    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="reg-email" placeholder="deine@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Passwort <span style="font-weight:400;text-transform:none;letter-spacing:0">(min. 12 Zeichen)</span></label>
      <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn-submit" id="btn-register" onclick="doRegister()">Konto erstellen →</button>
  </div>

  <div class="card-footer">
    <a href="index.html">← Zurück zur Startseite</a>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
